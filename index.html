/* ──────────────────────────────────────────────
   FIX 5: Real-time review form validation
   + FIX 11: Review draft in localStorage
────────────────────────────────────────────── */
(function patchReviewForm() {
  const DRAFT_KEY = 'gm_review_draft';

  const originalShowReviewForm = window.showReviewForm;
  window.showReviewForm = function(id) {
    // Reset rating to 0 (not 5)
    window.rRating = 0;

    document.getElementById('rvOverlay')?.remove();
    const o = document.createElement('div');
    o.className = 'review-overlay';
    o.id = 'rvOverlay';
    o.onclick = e => { if (e.target === o) o.remove(); };

    // Stars — all inactive initially
    const starsHtmlForm = [1, 2, 3, 4, 5].map(i =>
      `<button class="form-star-btn" onclick="setRv(${i})" data-star="${i}">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      </button>`
    ).join('');

    // Restore draft text
    const draftText = memStorage.getItem(DRAFT_KEY) || '';

    o.innerHTML = `<div class="review-form">
      <div class="form-handle"></div>
      <div class="form-title">Написать отзыв</div>
      <input class="form-input" type="text" id="rvName" placeholder="Ваше имя">
      <div class="form-stars" id="rvStars">${starsHtmlForm}</div>
      <textarea class="form-input" id="rvText" placeholder="Поделитесь впечатлениями..." rows="3">${draftText}</textarea>
      <div class="review-char-count" id="rvCharCount">${draftText.length} символов</div>
      <button class="form-submit" id="rvSubmitBtn" onclick="submitReview(${id})" disabled>ОПУБЛИКОВАТЬ</button>
    </div>`;

    document.body.appendChild(o);

    // Wire up real-time validation
    const textarea = document.getElementById('rvText');
    const charCount = document.getElementById('rvCharCount');
    const submitBtn = document.getElementById('rvSubmitBtn');

    function validateForm() {
      const textVal = textarea ? textarea.value.trim() : '';
      const textOk = textVal.length >= 5;
      const ratingOk = window.rRating > 0;

      if (textarea) {
        if (textVal.length === 0) {
          textarea.classList.remove('input-error', 'input-valid');
        } else if (!textOk) {
          textarea.classList.add('input-error');
          textarea.classList.remove('input-valid');
        } else {
          textarea.classList.add('input-valid');
          textarea.classList.remove('input-error');
        }
      }

      if (charCount) {
        charCount.textContent = textVal.length + ' символов';
        charCount.style.color = textOk ? 'rgba(202,255,0,0.5)' : 'rgba(255,80,80,0.5)';
        if (textVal.length === 0) charCount.style.color = 'rgba(255,255,255,0.3)';
      }

      if (submitBtn) {
        submitBtn.disabled = !(textOk && ratingOk);
      }

      // Save draft
      if (textarea) {
        memStorage.setItem(DRAFT_KEY, textarea.value);
      }
    }

    if (textarea) {
      textarea.addEventListener('input', validateForm);
      // Run once for restored draft
      validateForm();
    }

    // Patch setRv to also re-validate
    const originalSetRv = window.setRv;
    window.setRv = function(r) {
      window.rRating = r;
      window.updateFormStars(r);
      validateForm();
    };
  };

  // Patch submitReview to clear draft on success
  const originalSubmitReview = window.submitReview;
  window.submitReview = function(id) {
    const name = document.getElementById('rvName')?.value.trim() || 'Гость';
    const text = document.getElementById('rvText')?.value.trim();
    if (!text || text.length < 5) { uxToast('Напишите хотя бы пару слов'); return; }
    if (window.rRating === 0) { uxToast('Поставьте оценку'); return; }

    if (!window.userReviews[id]) window.userReviews[id] = [];
    window.userReviews[id].unshift({ name, rating: window.rRating, text, date: 'только что' });
    document.getElementById('rvOverlay')?.remove();

    // Clear draft
    memStorage.removeItem(DRAFT_KEY);

    uxToast('Отзыв опубликован');
    if (window.currentVenueId === id) {
      document.getElementById('venueScreen')?.remove();
      window.openVenue(id);
    }
  };
})();


/* ──────────────────────────────────────────────
   FIX 6: Empty state overlay on map search
────────────────────────────────────────────── */
(function patchMapEmptyState() {
  // Inject empty-state element into map container on first map use
  function ensureMapEmptyEl() {
    const mc = document.getElementById('mapContainer');
    if (!mc || document.getElementById('mapEmptyState')) return;
    const el = document.createElement('div');
    el.id = 'mapEmptyState';
    el.innerHTML = `
      <svg class="map-empty-icon" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
      <div class="map-empty-text">Ничего не найдено</div>
      <div class="map-empty-sub">Попробуйте другой запрос</div>
    `;
    mc.appendChild(el);
  }

  const originalFilterMapMarkers = window.filterMapMarkers;
  window.filterMapMarkers = function(q) {
    if (!window.leafMap) { originalFilterMapMarkers && originalFilterMapMarkers(q); return; }

    ensureMapEmptyEl();

    const VENUES = window.VENUES || [];
    let visibleCount = 0;
    VENUES.forEach(v => {
      const m = window.markers && window.markers[v.id];
      if (!m) return;
      const match = !q || v.name.toLowerCase().includes(q.toLowerCase()) || v.cat.toLowerCase().includes(q.toLowerCase());
      if (match) {
        if (!window.leafMap.hasLayer(m)) m.addTo(window.leafMap);
        visibleCount++;
      } else {
        if (window.leafMap.hasLayer(m)) window.leafMap.removeLayer(m);
      }
    });

    const emptyEl = document.getElementById('mapEmptyState');
    if (emptyEl) {
      emptyEl.style.display = (q && visibleCount === 0) ? 'block' : 'none';
    }
  };

  // Also hide empty state when search is cleared
  const mapSearchInput = document.getElementById('mapSearch');
  if (mapSearchInput) {
    mapSearchInput.addEventListener('input', function() {
      if (!this.value) {
        const emptyEl = document.getElementById('mapEmptyState');
        if (emptyEl) emptyEl.style.display = 'none';
      }
    });
  }
})();

    startTs: null,
    duration: 5000,
    animFrame: null,
  };

  function openStories(venueId, startCatIdx) {
    const venue = (typeof VENUES !== 'undefined' ? VENUES : []).find(v => v.id === venueId);
    if (!venue) return;

    _sv.cats = buildStoryCategories(venue);
    _sv.venue = venue;
    _sv.catIdx = startCatIdx || 0;
    _sv.subIdx = 0;

    // Remove any existing overlay
    document.getElementById('gm-stories-viewer')?.remove();
    clearTimeout(_sv.timer);
    cancelAnimationFrame(_sv.animFrame);

    const overlay = document.createElement('div');
    overlay.className = 'sv-overlay';
    overlay.id = 'gm-stories-viewer';
    overlay.innerHTML = `
      <div class="sv-bg"><img id="sv-bg-img" src="" alt=""></div>
      <img class="sv-photo" id="sv-photo" src="" alt="">
      <div class="sv-progress" id="sv-progress"></div>
      <div class="sv-header">
        <div class="sv-venue-name" id="sv-venue-name"></div>
        <div class="sv-category-name" id="sv-category-name"></div>
      </div>
      <button class="sv-close" id="sv-close-btn">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="sv-tap-left" id="sv-tap-left"></div>
      <div class="sv-tap-right" id="sv-tap-right"></div>
    `;

    // Touch swipe for categories
    let touchStartX = 0;
    overlay.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    overlay.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 60) {
        if (dx < 0) _svNextCat();
        else _svPrevCat();
      }
    });

    overlay.querySelector('#sv-close-btn').addEventListener('click', closeStories);
    overlay.querySelector('#sv-tap-left').addEventListener('click', _svPrev);
    overlay.querySelector('#sv-tap-right').addEventListener('click', _svNext);

    // Keyboard
    const _keyHandler = e => {
      if (e.key === 'Escape') closeStories();
      if (e.key === 'ArrowRight') _svNext();
      if (e.key === 'ArrowLeft') _svPrev();
    };
    document.addEventListener('keydown', _keyHandler);
    overlay._removeKeyHandler = () => document.removeEventListener('keydown', _keyHandler);

    _sv.overlay = overlay;
    document.body.appendChild(overlay);
    _svRender();
  }

  function closeStories() {
    if (!_sv.overlay) return;
    clearTimeout(_sv.timer);
    cancelAnimationFrame(_sv.animFrame);
    _sv.overlay._removeKeyHandler?.();
    _sv.overlay.remove();
    _sv.overlay = null;
  }

  function _svRender() {
    if (!_sv.overlay) return;
    const cat = _sv.cats[_sv.catIdx];
    if (!cat) { closeStories(); return; }

    const sub = cat.substories[_sv.subIdx];
    const photo = _sv.overlay.querySelector('#sv-photo');
    const bgImg = _sv.overlay.querySelector('#sv-bg-img');

    // Swap image with fade
    photo.style.opacity = '0';
    photo.onload = () => { photo.style.opacity = '1'; };
    photo.src = sub;
    bgImg.src = sub;

    _sv.overlay.querySelector('#sv-venue-name').textContent = _sv.venue.name;
    _sv.overlay.querySelector('#sv-category-name').textContent = cat.label;

    // Build progress bars
    const prog = _sv.overlay.querySelector('#sv-progress');
    prog.innerHTML = cat.substories.map((_, i) => `
      <div class="sv-seg"><div class="sv-seg-fill" id="sv-fill-${i}"></div></div>
    `).join('');

    // Fill completed segments
    for (let i = 0; i < _sv.subIdx; i++) {
      const fill = prog.querySelector(`#sv-fill-${i}`);
      if (fill) fill.style.width = '100%';
    }

    // Animate current segment
    clearTimeout(_sv.timer);
    cancelAnimationFrame(_sv.animFrame);
    _sv.startTs = null;

    function animTick(ts) {
      if (!_sv.overlay) return;
      if (!_sv.startTs) _sv.startTs = ts;
      const elapsed = ts - _sv.startTs;
      const pct = Math.min(100, (elapsed / _sv.duration) * 100);
      const fill = _sv.overlay?.querySelector(`#sv-fill-${_sv.subIdx}`);
      if (fill) fill.style.width = pct + '%';
      if (pct < 100) {
        _sv.animFrame = requestAnimationFrame(animTick);
      } else {
        _svNext();
      }
    }
    _sv.animFrame = requestAnimationFrame(animTick);
  }

  function _svNext() {
    if (!_sv.overlay) return;
    const cat = _sv.cats[_sv.catIdx];
    if (_sv.subIdx < cat.substories.length - 1) {
      // Mark current sub done
      const fill = _sv.overlay?.querySelector(`#sv-fill-${_sv.subIdx}`);
      if (fill) fill.style.width = '100%';
      _sv.subIdx++;
      cancelAnimationFrame(_sv.animFrame);
      _sv.startTs = null;
      _svRender();
    } else {
      _svNextCat();
    }
  }

  function _svPrev() {
    if (!_sv.overlay) return;
    if (_sv.subIdx > 0) {
      _sv.subIdx--;
      cancelAnimationFrame(_sv.animFrame);
      _sv.startTs = null;
      _svRender();
    } else if (_sv.catIdx > 0) {
      _sv.catIdx--;
      _sv.subIdx = 0;
      cancelAnimationFrame(_sv.animFrame);
      _sv.startTs = null;
      _svRender();
    }
  }

  function _svNextCat() {
    if (!_sv.overlay) return;
    // Mark this category as viewed
    const viewKey = `${_sv.venue.id}-${_sv.cats[_sv.catIdx].label}`;
    _viewedStories.add(viewKey);
    saveViewed(_viewedStories);
    _updateStoryRing(_sv.venue.id, _sv.cats[_sv.catIdx].label);

    if (_sv.catIdx < _sv.cats.length - 1) {
      _sv.catIdx++;
      _sv.subIdx = 0;
      cancelAnimationFrame(_sv.animFrame);
      _sv.startTs = null;
      _svRender();
    } else {
      closeStories();
    }
  }

  function _updateStoryRing(venueId, catLabel) {
    // Find and grey out the ring in the DOM if venue screen is open
    const rings = document.querySelectorAll('.venue-story-circle');
    rings.forEach(circle => {
      const label = circle.querySelector('.venue-story-label')?.textContent?.trim();
      if (label === catLabel) {
        const ring = circle.querySelector('.venue-story-ring');
        if (ring) ring.classList.add('sv-ring-viewed');
      }
    });
  }

  // Check if a story was already viewed
  function isViewed(venueId, catLabel) {
    return _viewedStories.has(`${venueId}-${catLabel}`);
  }

  /* ─────────────────────────────────────────────────────────────────
     FEATURE 2: REAL CTA ACTIONS
  ──────────────────────────────────────────────────────────────── */

  function doRoute(venueId) {
    const v = (typeof VENUES !== 'undefined' ? VENUES : []).find(x => x.id === venueId);
    if (!v) return;
    let url;
    if (v.lat && v.lng) {
      url = `https://yandex.ru/maps/?rtext=~${v.lat},${v.lng}&rtt=auto`;
    } else {
      url = `https://yandex.ru/maps/?text=${encodeURIComponent(v.addr + ', Екатеринбург')}`;
    }
    window.open(url, '_blank');
  }

  function doCall(venueId) {
    const v = (typeof VENUES !== 'undefined' ? VENUES : []).find(x => x.id === venueId);
    if (!v) return;
    if (v.phone) {
      window.location.href = `tel:${v.phone.replace(/\s/g, '')}`;
    } else {
      if (typeof toast === 'function') toast('Номер телефона не указан');
    }
  }

  function doShare(venueId) {
    const v = (typeof VENUES !== 'undefined' ? VENUES : []).find(x => x.id === venueId);
    if (!v) return;
    if (navigator.share) {
      navigator.share({
        title: v.name,
        text: `${v.name} — ${v.cat} ${v.rating}★ | Ср.чек: ${v.avgCheck}₽`,
        url: window.location.href
      }).catch(() => {});
    } else {
      const text = `Рекомендую: ${v.name} — ${v.cat} ${v.rating}★ в Екатеринбурге`;
      navigator.clipboard?.writeText(text).then(() => {
        if (typeof toast === 'function') toast('Ссылка скопирована');
      }).catch(() => {
        if (typeof toast === 'function') toast('Ссылка скопирована');
      });
    }
  }

  // Expose globally
  window.gmDoRoute = doRoute;
  window.gmDoCall = doCall;
  window.gmDoShare = doShare;

  /* ─────────────────────────────────────────────────────────────────
     SORTING STATE
  ──────────────────────────────────────────────────────────────── */
  let _sortMode = 'rating'; // 'rating' | 'cheaper' | 'expensive' | 'alpha'
  const SORT_LABELS = {
    rating: 'По рейтингу',
    cheaper: 'Дешевле',
    expensive: 'Дороже',
    alpha: 'По алфавиту',
  };

  function sortVenues(arr) {
    const copy = [...arr];
    switch (_sortMode) {
      case 'rating':    copy.sort((a, b) => b.rating - a.rating); break;
      case 'cheaper':   copy.sort((a, b) => (a.avgCheck || 0) - (b.avgCheck || 0)); break;
      case 'expensive': copy.sort((a, b) => (b.avgCheck || 0) - (a.avgCheck || 0)); break;
      case 'alpha':     copy.sort((a, b) => a.name.localeCompare(b.name, 'ru')); break;
    }
    return copy;
  }

  /* ─────────────────────────────────────────────────────────────────
     OVERRIDE: renderCatalog — adds cuisine tags, sort, counter
  ──────────────────────────────────────────────────────────────── */
  const _origRenderCatalog = typeof renderCatalog === 'function' ? renderCatalog : null;

  function patchedRenderCatalog() {
    const venues = typeof VENUES !== 'undefined' ? VENUES : [];
    const filter = typeof catFilter !== 'undefined' ? catFilter : 'all';
    const search = typeof catSearch !== 'undefined' ? catSearch : '';

    const filtered = venues.filter(v => {
      const mc = filter === 'all' || v.cat === filter;
      const ms = !search ||
        v.name.toLowerCase().includes(search.toLowerCase()) ||
        v.addr.toLowerCase().includes(search.toLowerCase());
      return mc && ms;
    });

    const sorted = sortVenues(filtered);

    const CATS_LIST = [
      { id: 'all', label: 'Все' },
      { id: 'Кафе', label: 'Кафе' },
      { id: 'Ресторан', label: 'Рестораны' },
      { id: 'Пиццерия', label: 'Пиццерия' },
      { id: 'Суши', label: 'Суши' },
      { id: 'Фастфуд', label: 'Фастфуд' },
      { id: 'Веганское', label: 'Веганское' },
    ];

    const chips = CATS_LIST.map(c =>
      `<button class="chip${filter === c.id ? ' active' : ''}" onclick="setCat('${c.id}')">${c.label}</button>`
    ).join('');

    let cardsHtml = '';
    if (sorted.length === 0) {
      cardsHtml = `<div class="catalog-empty">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <div class="catalog-empty-title">Ничего не найдено</div>
        <div class="catalog-empty-sub">Попробуйте другой запрос</div>
      </div>`;
    } else {
      cardsHtml = `<div class="catalog-grid">`;
      let idx = 0;
      sorted.forEach((v, i) => {
        const posInCycle = idx % 3;
        const sizeClass = (posInCycle === 0) ? 'large' : 'small';
        const favClass = v.fav ? 'card-fav fav-on' : 'card-fav fav-off';
        const cuisineStr = (v.cuisines && v.cuisines.length)
          ? v.cuisines.join(' · ')
          : '';
        cardsHtml += `
          <div class="venue-card ${sizeClass}" onclick="openVenue(${v.id})" style="animation-delay:${i * 60}ms">
            <img class="venue-card-bg" src="${v.photo}" alt="" onerror="this.style.background='#1a1a1a'">
            <div class="venue-card-overlay"></div>
            <div class="venue-card-glass">
              <div class="venue-card-info">
                <div class="venue-card-name">${v.name}</div>
                <div class="venue-card-sub">${v.cat} · ${v.addr}</div>
                ${cuisineStr ? `<div class="card-cuisines">${cuisineStr}</div>` : ''}
              </div>
              <div class="venue-card-right">
                <div class="venue-rating">
                  ${typeof starSvg === 'function' ? starSvg(true, 10) : ''}
                  <span class="venue-rating-num">${v.rating}</span>
                </div>
                <span class="${v.open ? 'badge-open' : 'badge-closed'}">${v.open ? 'Открыто' : 'Закрыто'}</span>
              </div>
            </div>
            <div class="${favClass}" onclick="event.stopPropagation();quickFav(${v.id},this)">${typeof heartSvg === 'function' ? heartSvg(v.fav, 13) : ''}</div>
          </div>`;
        idx++;
      });
      cardsHtml += `</div>`;
    }

    const sortLabel = SORT_LABELS[_sortMode] || 'По рейтингу';
    const sortSvg = `<svg viewBox="0 0 24 24"><path d="M3 6h18M7 12h10M11 18h2"/></svg>`;

    return `<div class="catalog-wrap">
      <div class="catalog-header">
        <div class="catalog-title">КАТАЛОГ<span>.</span></div>
        <div class="catalog-search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" placeholder="Ресторан, кафе, суши..." oninput="catSearch=this.value;refreshCatalog()" value="${search}">
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <div class="chips-wrap" style="flex:1;min-width:0;">
            <div class="chips">${chips}</div>
          </div>
          <div class="sort-pill-wrap" id="sortPillWrap">
            <button class="sort-pill" id="sortPillBtn" onclick="gmToggleSortDropdown(event)">
              ${sortSvg}${sortLabel}
            </button>
          </div>
        </div>
        <div class="catalog-count">Найдено <span>${sorted.length}</span> заведени${_pluralize(sorted.length)}</div>
      </div>
      <div class="catalog-list">${cardsHtml}</div>
    </div>`;
  }

  function _pluralize(n) {
    if (n % 100 >= 11 && n % 100 <= 19) return 'й';
    const r = n % 10;
    if (r === 1) return 'е';
    if (r >= 2 && r <= 4) return 'я';
    return 'й';
  }

  window.gmToggleSortDropdown = function (e) {
    e.stopPropagation();
    const existing = document.getElementById('sortDropdown');
    if (existing) { existing.remove(); return; }

    const wrap = document.getElementById('sortPillWrap');
    if (!wrap) return;

    const dropdown = document.createElement('div');
    dropdown.className = 'sort-dropdown';
    dropdown.id = 'sortDropdown';

    const options = [
      { key: 'rating', label: 'По рейтингу' },
      { key: 'cheaper', label: 'Дешевле' },
      { key: 'expensive', label: 'Дороже' },
      { key: 'alpha', label: 'По алфавиту' },
    ];
    dropdown.innerHTML = options.map(o => `
      <div class="sort-option${_sortMode === o.key ? ' active' : ''}" onclick="gmSetSort('${o.key}')">
        ${o.label}
        ${_sortMode === o.key ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#CAFF00" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
      </div>
    `).join('');

    wrap.appendChild(dropdown);

    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', function _close() {
        dropdown.remove();
        document.removeEventListener('click', _close);
      });
    }, 0);
  };

  window.gmSetSort = function (mode) {
    _sortMode = mode;
    document.getElementById('sortDropdown')?.remove();
    if (typeof refreshCatalog === 'function') refreshCatalog();
  };

  // Override renderCatalog globally
  window.renderCatalog = patchedRenderCatalog;

  /* ─────────────────────────────────────────────────────────────────
     OVERRIDE: openVenue — add stories viewer, CTA actions, cuisine chips,
               remove duplicate rating/status, fix layout for no-stories
  ──────────────────────────────────────────────────────────────── */
  const _origOpenVenue = typeof openVenue === 'function' ? openVenue : null;

  function patchedOpenVenue(id) {
    if (typeof currentVenueId !== 'undefined') window.currentVenueId = id;

    if (!v) return;

    const reviews = [...((typeof REVIEWS !== 'undefined' ? REVIEWS : {})[id] || []),

    const hoursHtml = Object.entries(v.hours || {}).map(([d, t]) =>
      `<div class="venue-hours-row"><span class="hours-day">${d}</span><span class="hours-time">${t}</span></div>`
    ).join('');

    const reviewsHtml = reviews.length
      ? reviews.map(r => `
          <div class="venue-review-item">
            <div class="review-top">
              <div class="review-avatar">${r.name[0]}</div>
              <div class="review-meta">
                <div class="review-name">${r.name}</div>
                <div class="review-date">${r.date}</div>
                <div class="review-stars">${typeof starsHtml === 'function' ? starsHtml(r.rating, 11) : ''}</div>
              </div>
            </div>
            <div class="review-text">${r.text}</div>
          </div>`).join('')
      : `<div style="color:rgba(255,255,255,0.25);font-size:14px;padding:16px 0">Отзывов пока нет</div>`;

    const favClass = v.fav ? 'venue-fav-btn fav-on' : 'venue-fav-btn fav-off';
    const checkins = typeof window.checkins !== 'undefined' ? window.checkins : {};

    // Build story circles with correct crop params and viewed state
    let storiesCirclesHtml = '';
    if (v.stories) {
      const baseUrl = v.photo.split('?')[0];
      const storyCats = [
        { label: 'Интерьер', thumb: `${baseUrl}?w=200&h=200&crop=entropy`, catIdx: 0 },
        { label: 'Кухня',    thumb: `${baseUrl}?w=200&h=200&crop=center`,  catIdx: 1 },
        { label: 'Подача',   thumb: `${baseUrl}?w=200&h=200&crop=faces`,   catIdx: 2 },
      ];
      storiesCirclesHtml = storyCats.map(s => {
        const viewed = isViewed(id, s.label);
        return `

            <div class="venue-story-ring${viewed ? ' sv-ring-viewed' : ''}">
              <img src="${s.thumb}" alt="" onerror="this.src='${v.photo}'">

            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h12M4 18h8"/></svg>

          `<span class="venue-cuisine-chip">${c}</span>`).join('')}</div>`
      : '';

    const screen = document.createElement('div');
    screen.className = 'venue-screen';
    screen.id = 'venueScreen';

    // FEATURE 5: Remove rating from hero (keep only name + cat).
    // Rating stays ONLY in the glass card.
    // Remove duplicate "Открыто/Закрыто" from rating row (keep only in address row).
    screen.innerHTML = `
      <!-- Fixed blurred background -->
      <div class="venue-bg-layer">
        <img class="venue-bg-img" src="${v.photo}" alt="">
        <div class="venue-bg-overlay"></div>
      </div>

      <!-- Scrollable content -->

        <!-- A. HERO — name + category only (no rating) -->

          <img class="venue-hero-photo" src="${v.photo}" alt="" onerror="this.style.background='#1a1a1a'">
          <div class="venue-hero-gradient"></div>

              <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <button class="${favClass}" id="vfav${id}" onclick="toggleFav(${id})">${typeof heartSvg === 'function' ? heartSvg(v.fav, 18) : ''}</button>
          </div>
          <div class="venue-hero-content">
            <div class="venue-hero-cat">${v.cat}</div>
            <div class="venue-hero-name">${v.name}</div>
            <!-- Rating removed from hero to avoid duplication -->
          </div>
        </div>

        <!-- B. MAIN GLASS CARD -->
        <div class="venue-main-card">

          <!-- 1. О ЗАВЕДЕНИИ + КАТЕГОРИЯ + КУХНИ -->
          <div class="venue-section-title" style="margin-top:0">О ЗАВЕДЕНИИ</div>
          <div class="venue-cat-badge">${v.cat}</div>
          ${cuisineChipsHtml}
          ${v.desc ? `<div class="venue-desc">${v.desc}</div>` : ''}

          <!-- АДРЕС (со статусом открыто/закрыто — ЕДИНСТВЕННОЕ место) -->
          <div class="venue-card-addr" style="margin-bottom:20px">
            <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            <div class="venue-card-addr-text">${v.addr}</div>
            <span class="${v.open ? 'badge-open' : 'badge-closed'}">${v.open ? 'Открыто' : 'Закрыто'}</span>
          </div>

          <!-- 2. STORIES + МЕНЮ -->
          ${storiesRowHtml}

          <!-- 3. ЧАСЫ РАБОТЫ -->
          <div class="venue-section-title">ЧАСЫ РАБОТЫ</div>
          <div class="venue-hours">${hoursHtml}</div>

          <!-- 4. РЕЙТИНГ (no status badge here — it's in address row) -->
          <div class="venue-section-title">РЕЙТИНГ</div>
          <div class="venue-rating-row">
            <div class="venue-rating-big">${v.rating}</div>
            <div class="venue-rating-right">
              <div class="venue-card-stars">${typeof starsHtml === 'function' ? starsHtml(v.rating, 14) : ''}</div>
              <div class="venue-card-revcount">${v.reviews} отзывов</div>
            </div>
            <div style="flex:1"></div>
          </div>

          <!-- 5. КНОПКИ ДЕЙСТВИЙ — real handlers -->
          <div class="venue-actions-inner">
            <div class="venue-action" onclick="showReviewForm(${id})">
              <div class="venue-action-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
              <span class="venue-action-label">Отзыв</span>
            </div>
            <div class="venue-action" onclick="gmDoShare(${id})">
              <div class="venue-action-icon"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
              <span class="venue-action-label">Поделиться</span>
            </div>
            <div class="venue-action" onclick="gmDoRoute(${id})">
              <div class="venue-action-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div>
              <span class="venue-action-label">Маршрут</span>
            </div>
            <div class="venue-action" onclick="doCheckin(${id})" id="aci${id}">
              <div class="venue-action-icon ${checkins[id] ? 'active' : ''}"><svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg></div>
              <span class="venue-action-label">${checkins[id] ? 'Выполнено' : 'Чекин'}</span>
            </div>
          </div>

        </div>

        <!-- C. BODY: КОНТАКТ + ОТЗЫВЫ -->
        <div class="venue-body">
          <div class="venue-contact" onclick="gmDoCall(${id})">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.79 19.79 19.79 0 01.09 1.18 2 2 0 012.07 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 7.5a16 16 0 006.59 6.59l.87-.87a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 15.5v1.42z"/></svg>
            <span>${v.phone || 'Нет номера'}</span>
          </div>
          <div class="venue-section-title">ОТЗЫВЫ · ${reviews.length}</div>
          ${reviewsHtml}
          <button class="write-review-btn" onclick="showReviewForm(${id})">НАПИСАТЬ ОТЗЫВ</button>
        </div>

      </div>`;

    document.getElementById('screen').appendChild(screen);
  }

  // Expose openStories globally
  window.gmOpenStories = openStories;

  // Override openVenue globally
  window.openVenue = patchedOpenVenue;

  /* ─────────────────────────────────────────────────────────────────
     OVERRIDE: refreshCatalog to use patched version
  ──────────────────────────────────────────────────────────────── */
  window.refreshCatalog = function () {
    if (typeof renderContent === 'function') {
      renderContent(patchedRenderCatalog());
    }
  };

  /* ─────────────────────────────────────────────────────────────────
     OVERRIDE: switchTab to use patched catalog on catalog switch
  ──────────────────────────────────────────────────────────────── */
  const _origSwitchTab = typeof switchTab === 'function' ? switchTab : null;
  window.switchTab = function (tab) {
    if (typeof currentTab !== 'undefined') window.currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tb = document.getElementById('tb-' + tab);
    if (tb) tb.classList.add('active');

    const mc = document.getElementById('mapContainer');
    mc.style.display = tab === 'map' ? 'block' : 'none';

    if (tab === 'map') {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (typeof initMap === 'function') initMap();
        if (typeof leafMap !== 'undefined' && leafMap) leafMap.invalidateSize(true);
      }));
      if (typeof renderContent === 'function') renderContent('');
    } else if (tab === 'catalog') {
      if (typeof renderContent === 'function') renderContent(patchedRenderCatalog());
    } else if (tab === 'favorites') {
      if (typeof renderContent === 'function' && typeof renderFavorites === 'function') renderContent(renderFavorites());
    } else {
      if (typeof renderContent === 'function' && typeof renderProfile === 'function') renderContent(renderProfile());
    }
  };

  /* ─────────────────────────────────────────────────────────────────
     INIT: if catalog is currently visible, re-render it
  ──────────────────────────────────────────────────────────────── */
  (function initPatch() {
    const currentTabVal = typeof currentTab !== 'undefined' ? currentTab : 'map';
    if (currentTabVal === 'catalog') {
      if (typeof renderContent === 'function') {
        renderContent(patchedRenderCatalog());
      }
    }
  })();

  console.log('[GastroMap Patches] All 8 marketing features loaded successfully.');

})();

</script>

</body>
</html>
