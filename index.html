<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GastroMap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ─── Reset & Base ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Space Grotesk',sans-serif;
  background:#080808;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  overflow:hidden;
}

/* ─── Desktop hint ──────────────────────────────────────────── */
.hint{
  display:none;
  flex-direction:column;
  gap:12px;
  margin-right:48px;
  max-width:200px;
}
@media(min-width:800px){.hint{display:flex}}
.hint-logo{font-size:28px;font-weight:700;color:#fff;letter-spacing:-1px}
.hint-logo span{color:#CAFF00}
.hint-desc{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6}
.hint-feat{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.hint-feat-item{font-size:12px;color:rgba(255,255,255,0.35);display:flex;gap:6px}
.hint-feat-item::before{content:'—';color:#CAFF00}

/* ─── Phone Shell ───────────────────────────────────────────── */
.phone{
  width:390px;
  height:844px;
  border-radius:52px;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
  background:#000;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.08),
    0 0 0 10px #111,
    0 0 0 11px rgba(255,255,255,0.05),
    0 40px 120px rgba(0,0,0,0.8),
    0 0 60px rgba(202,255,0,0.04);
}

/* ─── Status Bar ────────────────────────────────────────────── */
.status-bar{
  position:absolute;
  top:0;left:0;right:0;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  z-index:100;
  pointer-events:none;
}
.status-time{font-size:15px;font-weight:600;color:#fff;letter-spacing:0}
.status-icons{display:flex;align-items:center;gap:6px}
.status-icons svg{fill:#fff}

/* ─── Screen ────────────────────────────────────────────────── */
.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
}

/* ─── Tab Bar ───────────────────────────────────────────────── */
.tab-bar{
  position:absolute;
  bottom:0;left:0;right:0;
  height:82px;
  padding:0 8px 24px;
  display:flex;
  align-items:flex-start;
  padding-top:10px;
  z-index:200;
  /* Liquid glass */
  background:rgba(12,12,12,0.72);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-top:1px solid rgba(255,255,255,0.07);
}
.tab-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  border:none;
  background:none;
  cursor:pointer;
  padding:4px 0;
}
.tab-icon{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
}
.tab-icon svg{width:22px;height:22px;stroke:rgba(255,255,255,0.3);fill:none;stroke-width:1.8;transition:stroke 0.2s}
.tab-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.3);letter-spacing:0.3px;transition:color 0.2s}
.tab-btn.active .tab-icon svg{stroke:#CAFF00}
.tab-btn.active .tab-label{color:#CAFF00}

/* ─── Content area ──────────────────────────────────────────── */
.content{
  position:absolute;
  inset:0;
  bottom:82px;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════════════════════
   MAP TAB
═══════════════════════════════════════════════════════════════ */
#mapContainer{
  position:absolute;
  inset:0;
  display:none;
}
#leafletMap{
  position:absolute;
  inset:0;
}

/* Map search — glass pill */
.map-search{
  position:absolute;
  top:52px;left:16px;right:16px;
  z-index:500;
  background:rgba(10,10,10,0.65);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  display:flex;
  align-items:center;
  padding:12px 16px;
  gap:10px;
}
.map-search svg{width:16px;height:16px;stroke:rgba(202,255,0,0.7);fill:none;stroke-width:2;flex-shrink:0}
.map-search input{
  background:none;
  border:none;
  outline:none;
  flex:1;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;
  color:#fff;
  font-weight:400;
}
.map-search input::placeholder{color:rgba(255,255,255,0.35)}

/* Map theme btn */
.map-theme-btn{
  position:absolute;
  top:116px;right:16px;
  z-index:500;
  width:42px;height:42px;
  border-radius:13px;
  background:rgba(10,10,10,0.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:18px;
}
.map-loc-btn{
  position:absolute;
  bottom:16px;right:16px;
  z-index:500;
  width:42px;height:42px;
  border-radius:13px;
  background:rgba(10,10,10,0.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.map-loc-btn svg{width:18px;height:18px;stroke:#CAFF00;fill:none;stroke-width:2}

/* Map bottom sheet — glass */
.map-sheet{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:600;
  padding:20px 20px 28px;
  background:rgba(8,8,8,0.82);
  backdrop-filter:blur(40px) saturate(200%);
  -webkit-backdrop-filter:blur(40px) saturate(200%);
  border-top:1px solid rgba(255,255,255,0.1);
  border-radius:28px 28px 0 0;
  animation:sheetUp 0.3s cubic-bezier(0.32,0.72,0,1);
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{
  width:36px;height:4px;
  background:rgba(255,255,255,0.15);
  border-radius:2px;
  margin:0 auto 16px;
}
.sheet-row{display:flex;gap:14px;align-items:flex-start}
.sheet-img{
  width:72px;height:72px;
  border-radius:14px;
  object-fit:cover;
  flex-shrink:0;
  border:1px solid rgba(255,255,255,0.08);
}
.sheet-info{flex:1;min-width:0}
.sheet-name{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-meta{font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sheet-rating{display:flex;align-items:center;gap:6px}
.sheet-stars{display:flex;gap:2px}
.sheet-star{font-size:12px}
.sheet-rating-num{font-size:13px;font-weight:600;color:#CAFF00}
.sheet-status-open{font-size:11px;font-weight:600;color:#CAFF00;background:rgba(202,255,0,0.12);padding:3px 8px;border-radius:6px;margin-left:6px}
.sheet-status-closed{font-size:11px;font-weight:600;color:rgba(255,80,80,0.9);background:rgba(255,80,80,0.1);padding:3px 8px;border-radius:6px;margin-left:6px}
.sheet-close{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,0.07);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sheet-close svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5}
.sheet-btn{
  width:100%;
  margin-top:16px;
  padding:14px;
  background:#CAFF00;
  color:#000;
  border:none;
  border-radius:14px;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  letter-spacing:0.3px;
}

/* ═══════════════════════════════════════════════════════════════
   CATALOG TAB
═══════════════════════════════════════════════════════════════ */
.catalog-wrap{
  height:100%;
  display:flex;
  flex-direction:column;
  background:#0a0a0a;
}
.catalog-header{
  padding:52px 20px 0;
  flex-shrink:0;
  background:#0a0a0a;
}
.catalog-title{
  font-size:38px;
  font-weight:700;
  color:#fff;
  letter-spacing:-1.5px;
  line-height:1;
  margin-bottom:16px;
}
.catalog-title span{color:#CAFF00}

/* Search in catalog */
.catalog-search{
  display:flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:12px 16px;
  margin-bottom:14px;
}
.catalog-search svg{width:16px;height:16px;stroke:rgba(255,255,255,0.3);fill:none;stroke-width:2;flex-shrink:0}
.catalog-search input{
  background:none;border:none;outline:none;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;color:#fff;flex:1;
}
.catalog-search input::placeholder{color:rgba(255,255,255,0.25)}

/* Category chips */
.chips{
  display:flex;gap:8px;
  overflow-x:auto;
  padding-bottom:14px;
  scrollbar-width:none;
}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;
  padding:7px 14px;
  border-radius:100px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.5);
  white-space:nowrap;
  transition:all 0.18s;
  letter-spacing:0.2px;
}
.chip.active{
  background:#CAFF00;
  color:#000;
  border-color:#CAFF00;
}

/* Venue cards list */
.catalog-list{
  flex:1;
  overflow-y:auto;
  padding:4px 20px 16px;
  scrollbar-width:none;
}
.catalog-list::-webkit-scrollbar{display:none}

/* ─── Venue Card (N99 style) ─── */
/* Full-bleed photo, glass info card floating on top */
.venue-card{
  position:relative;
  height:200px;
  border-radius:22px;
  overflow:hidden;
  margin-bottom:14px;
  cursor:pointer;
}
.venue-card-bg{
  position:absolute;
  inset:0;
  object-fit:cover;
  width:100%;height:100%;
  transition:transform 0.4s ease;
}
.venue-card:active .venue-card-bg{transform:scale(1.03)}
.venue-card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0%,
    rgba(0,0,0,0.1) 40%,
    rgba(0,0,0,0.75) 100%
  );
}
/* Glass info pill at bottom */
.venue-card-glass{
  position:absolute;
  bottom:12px;
  left:12px;
  right:12px;
  background:rgba(10,10,10,0.55);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:16px;
  padding:12px 14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.venue-card-info{flex:1;min-width:0}
.venue-card-name{
  font-size:16px;
  font-weight:700;
  color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:3px;
  letter-spacing:-0.3px;
}
.venue-card-sub{
  font-size:11px;
  color:rgba(255,255,255,0.5);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.venue-card-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:5px;
  flex-shrink:0;
}
.venue-rating{
  display:flex;
  align-items:center;
  gap:4px;
}
.venue-rating-star{color:#CAFF00;font-size:12px}
.venue-rating-num{font-size:13px;font-weight:700;color:#fff}
.badge-open{
  font-size:10px;font-weight:600;
  color:#CAFF00;
  background:rgba(202,255,0,0.15);
  border:1px solid rgba(202,255,0,0.25);
  padding:3px 8px;border-radius:6px;
}
.badge-closed{
  font-size:10px;font-weight:600;
  color:rgba(255,100,100,0.9);
  background:rgba(255,80,80,0.1);
  border:1px solid rgba(255,80,80,0.2);
  padding:3px 8px;border-radius:6px;
}
/* Fav button on card */
.card-fav{
  position:absolute;
  top:12px;right:12px;
  width:34px;height:34px;
  border-radius:11px;
  background:rgba(10,10,10,0.55);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:15px;
}

/* ═══════════════════════════════════════════════════════════════
   VENUE SCREEN (N99 inspired)
═══════════════════════════════════════════════════════════════ */
.venue-screen{
  position:absolute;
  inset:0;
  bottom:0;
  background:#080808;
  z-index:400;
  overflow-y:auto;
  scrollbar-width:none;
  animation:slideRight 0.35s cubic-bezier(0.32,0.72,0,1);
}
.venue-screen::-webkit-scrollbar{display:none}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}

/* Hero section — full photo with glass overlay */
.venue-hero{
  position:relative;
  height:340px;
  flex-shrink:0;
}
.venue-hero-bg{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  object-fit:cover;
}
.venue-hero-gradient{
  position:absolute;
  inset:0;
  background:linear-gradient(
    180deg,
    rgba(0,0,0,0.2) 0%,
    rgba(0,0,0,0) 40%,
    rgba(8,8,8,0.95) 100%
  );
}
/* Back button */
.venue-back{
  position:absolute;
  top:52px;left:16px;
  width:38px;height:38px;
  border-radius:12px;
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.venue-back svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2.5}
.venue-fav-btn{
  position:absolute;
  top:52px;right:16px;
  width:38px;height:38px;
  border-radius:12px;
  background:rgba(10,10,10,0.6);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:17px;
}

/* Glass card over hero — exactly like N99 */
.venue-glass-card{
  position:absolute;
  bottom:0;left:16px;right:16px;
  background:rgba(12,12,12,0.6);
  backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:22px 22px 0 0;
  padding:20px 20px 0;
}
.venue-glass-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:10px;
}
.venue-name-wrap{}
.venue-glass-label{
  font-size:10px;
  font-weight:600;
  color:#CAFF00;
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-bottom:4px;
}
.venue-glass-name{
  font-size:26px;
  font-weight:700;
  color:#fff;
  letter-spacing:-0.8px;
  line-height:1.1;
}
.venue-glass-rating{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
}
.venue-glass-stars{display:flex;gap:2px}
.venue-glass-star{color:#CAFF00;font-size:13px}
.venue-glass-rev{font-size:11px;color:rgba(255,255,255,0.4)}

.venue-glass-meta{
  display:flex;
  align-items:center;
  gap:8px;
  padding:12px 0;
  border-top:1px solid rgba(255,255,255,0.07);
}
.venue-glass-address{
  font-size:12px;
  color:rgba(255,255,255,0.45);
  flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.venue-glass-status{}

/* Body */
.venue-body{
  padding:20px 20px 0;
}

/* Tags row */
.venue-tags{
  display:flex;flex-wrap:wrap;gap:7px;
  margin-bottom:20px;
}
.venue-tag{
  font-size:11px;font-weight:600;
  color:rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  padding:5px 12px;
  border-radius:8px;
  letter-spacing:0.3px;
}

/* Action buttons — glass squares */
.venue-actions{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:24px;
}
.venue-action{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:7px;
  cursor:pointer;
}
.venue-action-icon{
  width:56px;height:56px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.09);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;
}
.venue-action-icon:hover{
  background:rgba(202,255,0,0.1);
  border-color:rgba(202,255,0,0.3);
}
.venue-action-icon.active{
  background:rgba(202,255,0,0.15);
  border-color:#CAFF00;
}
.venue-action-icon svg{width:20px;height:20px;stroke:rgba(255,255,255,0.7);fill:none;stroke-width:1.8}
.venue-action-icon.active svg{stroke:#CAFF00}
.venue-action-label{font-size:10px;color:rgba(255,255,255,0.35);font-weight:500;letter-spacing:0.2px}

/* Section titles */
.venue-section-title{
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,0.35);
  letter-spacing:1.8px;
  text-transform:uppercase;
  margin-bottom:12px;
}

/* Desc */
.venue-desc{
  font-size:14px;
  color:rgba(255,255,255,0.55);
  line-height:1.6;
  margin-bottom:24px;
}

/* Hours */
.venue-hours{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:16px;
  padding:14px 16px;
  margin-bottom:24px;
}
.venue-hours-row{
  display:flex;justify-content:space-between;
  font-size:13px;
  padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.venue-hours-row:last-child{border-bottom:none}
.hours-day{color:rgba(255,255,255,0.35)}
.hours-time{color:#fff;font-weight:500}

/* Contact */
.venue-contact{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:14px;
  margin-bottom:24px;
  cursor:pointer;
}
.venue-contact svg{width:18px;height:18px;stroke:#CAFF00;fill:none;stroke-width:1.8;flex-shrink:0}
.venue-contact span{font-size:14px;color:#CAFF00;font-weight:500}

/* Reviews */
.venue-review-item{
  padding:16px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.venue-review-item:last-child{border-bottom:none}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.review-user{display:flex;align-items:center;gap:10px}
.review-avatar{
  width:32px;height:32px;
  border-radius:10px;
  background:linear-gradient(135deg,#CAFF00,#8BC200);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#000;
  flex-shrink:0;
}
.review-name{font-size:13px;font-weight:600;color:#fff}
.review-date{font-size:11px;color:rgba(255,255,255,0.3)}
.review-stars{display:flex;gap:2px;font-size:11px;color:#CAFF00}
.review-text{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.55}

/* Write review btn */
.write-review-btn{
  width:100%;
  padding:16px;
  background:#CAFF00;
  color:#000;
  border:none;
  border-radius:16px;
  font-family:'Space Grotesk',sans-serif;
  font-size:14px;font-weight:700;
  cursor:pointer;
  letter-spacing:0.3px;
  margin-top:16px;
  margin-bottom:32px;
}

};

/* ── State ────────────────────────────────────────────────────── */
let currentTab='map', currentVenueId=null, mapDark=true;
let leafMap=null, tileL=null, markers={}, selMarker=null;
let catFilter='all', catSearch='', mapInited=false;
let userReviews={}, checkins={};

/* ── Toast ────────────────────────────────────────────────────── */
let _tt=null;
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(_tt);_tt=setTimeout(()=>t.remove(),2200);
}

/* ── Stars ────────────────────────────────────────────────────── */
function starsHtml(r,size=13){
  let s='';
  for(let i=1;i<=5;i++) s+=`<span style="font-size:${size}px;color:${i<=Math.round(r)?'#CAFF00':'rgba(255,255,255,0.15)'}">${i<=Math.round(r)?'★':'★'}</span>`;
  return s;
}

/* ── Pin ──────────────────────────────────────────────────────── */
function createPin(emoji,sel,fav){
  const fill=sel?'#CAFF00':'rgba(10,10,10,0.85)';
  const stroke=sel?'rgba(0,0,0,0.3)':'#CAFF00';
  const shadow=sel?'drop-shadow(0 0 8px rgba(202,255,0,0.6))':'drop-shadow(0 4px 10px rgba(0,0,0,0.6))';
  const sc=sel?'scale(1.25)':'scale(1)';
  const favBadge=fav?`<circle cx="34" cy="10" r="8" fill="#FF3B30"/><text x="34" y="14" text-anchor="middle" font-size="9" fill="white">♥</text>`:'';
  return L.divIcon({
    className:'',
    html:`<svg width="44" height="54" viewBox="0 0 44 54" xmlns="http://www.w3.org/2000/svg" style="filter:${shadow};transform:${sc};transform-origin:22px 54px;transition:transform 0.2s,filter 0.2s">
      <path d="M22 1C10.9 1 2 9.9 2 21C2 35.5 22 53 22 53C22 53 42 35.5 42 21C42 9.9 33.1 1 22 1Z" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
      <text x="22" y="27" text-anchor="middle" dominant-baseline="middle" font-size="18">${emoji}</text>
      ${favBadge}
    </svg>`,
    iconSize:[44,54],iconAnchor:[22,54],popupAnchor:[0,-56]
  });
}

/* ── Map ──────────────────────────────────────────────────────── */
const DARK='https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png';
const LIGHT='https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png';

function initMap(){
  if(mapInited)return;
  mapInited=true;
  const el=document.getElementById('leafletMap');
  el.style.cssText='position:absolute;inset:0;';
  leafMap=L.map('leafletMap',{center:[56.8389,60.6057],zoom:14,zoomControl:false,attributionControl:true});
  tileL=L.tileLayer(DARK,{subdomains:'abcd',maxZoom:19,tileSize:256,keepBuffer:4}).addTo(leafMap);
  [100,300,700].forEach(d=>setTimeout(()=>leafMap&&leafMap.invalidateSize(true),d));
  VENUES.forEach(v=>{
    const m=L.marker([v.lat,v.lng],{icon:createPin(v.icon,false,v.fav)}).addTo(leafMap);
    m.on('click',e=>{L.DomEvent.stopPropagation(e);showMapSheet(v.id);});
    markers[v.id]=m;
  });
  leafMap.on('click',()=>closeMapSheet());
}

function updatePin(id){
  const v=VENUES.find(x=>x.id===id);
  if(v&&markers[id]) markers[id].setIcon(createPin(v.icon,selMarker===id,v.fav));
}

function showMapSheet(id){
  closeMapSheet(true);
  selMarker=id;
  updatePin(id);
  const v=VENUES.find(x=>x.id===id);
  const mc=document.getElementById('mapContainer');
  const s=document.createElement('div');
  s.className='map-sheet';s.id='mapSheet';
  s.innerHTML=`<div class="sheet-handle"></div>
    <div class="sheet-row">
      <img class="sheet-img" src="${v.photo}" alt="" onerror="this.style.background='#1a1a1a'">
      <div class="sheet-info">
        <div class="sheet-name">${v.name}</div>
        <div class="sheet-meta">${v.cat} · ${v.addr}</div>
        <div class="sheet-rating">
          <div class="sheet-stars">${starsHtml(v.rating,12)}</div>
          <span class="sheet-rating-num">${v.rating}</span>
          <span class="${v.open?'sheet-status-open':'sheet-status-closed'}">${v.open?'Открыто':'Закрыто'}</span>
        </div>
      </div>
      <button class="sheet-close" onclick="closeMapSheet()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="sheet-btn" onclick="openVenue(${v.id})">Открыть заведение</button>`;
  mc.appendChild(s);
}

function closeMapSheet(silent){
  const s=document.getElementById('mapSheet');
  if(s)s.remove();
  if(!silent&&selMarker){updatePin(selMarker);selMarker=null;}
}

function toggleMapTheme(){
  mapDark=!mapDark;
  document.getElementById('themeBtn').textContent=mapDark?'🌙':'☀️';
  if(leafMap&&tileL){
    leafMap.removeLayer(tileL);
    tileL=L.tileLayer(mapDark?DARK:LIGHT,{subdomains:'abcd',maxZoom:19,tileSize:256,keepBuffer:4}).addTo(leafMap);
  }
}

function goCenter(){
  if(leafMap) leafMap.flyTo([56.8389,60.6057],14,{duration:1});
}

function filterMapMarkers(q){
  if(!leafMap)return;
  VENUES.forEach(v=>{
    const m=markers[v.id];
    if(!m)return;
    const match=!q||v.name.toLowerCase().includes(q.toLowerCase())||v.cat.toLowerCase().includes(q.toLowerCase());
    if(match){if(!leafMap.hasLayer(m))m.addTo(leafMap);}
    else{if(leafMap.hasLayer(m))leafMap.removeLayer(m);}
  });
}

/* ── Tabs ─────────────────────────────────────────────────────── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tb-'+tab).classList.add('active');
  const mc=document.getElementById('mapContainer');
  mc.style.display=tab==='map'?'block':'none';
  if(tab==='map'){
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      initMap();
      if(leafMap) leafMap.invalidateSize(true);
    }));
    renderContent('');
  } else if(tab==='catalog'){renderContent(renderCatalog());}
  else if(tab==='favorites'){renderContent(renderFavorites());}
  else{renderContent(renderProfile());}
}

function renderContent(html){
  const c=document.getElementById('content');
  // Remove venue screen if present
  document.getElementById('venueScreen')?.remove();
  // Set content (keeping mapContainer)
  const existing=c.querySelector('.catalog-wrap,.fav-wrap,.profile-wrap');
  if(existing)existing.remove();
  if(html){
    const div=document.createElement('div');
    div.innerHTML=html;
    while(div.firstChild)c.appendChild(div.firstChild);
  }
}

/* ── Venue ────────────────────────────────────────────────────── */
function openVenue(id){
  currentVenueId=id;
  closeMapSheet(true);
  const v=VENUES.find(x=>x.id===id);
  const revs=[...(REVIEWS[id]||[]),...(userReviews[id]||[])];
  const hoursHtml=Object.entries(v.hours).map(([d,t])=>`<div class="venue-hours-row"><span class="hours-day">${d}</span><span class="hours-time">${t}</span></div>`).join('');
  const reviewsHtml=revs.length?revs.map(r=>`
    <div class="venue-review-item">
      <div class="review-header">
        <div class="review-user">
          <div class="review-avatar">${r.name[0]}</div>
          <div><div class="review-name">${r.name}</div><div class="review-date">${r.date}</div></div>
        </div>
        <div class="review-stars">${starsHtml(r.rating,12)}</div>
      </div>
      <div class="review-text">${r.text}</div>
    </div>`).join(''):`<div style="color:rgba(255,255,255,0.25);font-size:14px;padding:16px 0">Отзывов пока нет</div>`;

  const screen=document.createElement('div');
  screen.className='venue-screen';screen.id='venueScreen';
  screen.innerHTML=`
    <div class="venue-hero">
      <img class="venue-hero-bg" src="${v.photo}" alt="">
      <div class="venue-hero-gradient"></div>
      <button class="venue-back" onclick="closeVenue()">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <button class="venue-fav-btn" id="vfav${id}" onclick="toggleFav(${id})">${v.fav?'❤️':'🤍'}</button>
      <div class="venue-glass-card">
        <div class="venue-glass-header">
          <div class="venue-name-wrap">
            <div class="venue-glass-label">${v.cat}</div>
            <div class="venue-glass-name">${v.name}</div>
          </div>
          <div class="venue-glass-rating">
            <div class="venue-glass-stars">${starsHtml(v.rating,14)}</div>
            <div class="venue-glass-rev">${v.reviews} отзывов</div>
          </div>
        </div>
        <div class="venue-glass-meta">
          <div class="venue-glass-address">📍 ${v.addr}</div>
          <span class="${v.open?'badge-open':'badge-closed'}">${v.open?'Открыто':'Закрыто'}</span>
        </div>
      </div>
    </div>
    <div class="venue-body">
      <div class="venue-tags">
        ${v.cuisines.map(c=>`<span class="venue-tag">${c}</span>`).join('')}
        ${v.stories?'<span class="venue-tag" style="color:#CAFF00;border-color:rgba(202,255,0,0.3)">STORIES</span>':''}
      </div>
      <div class="venue-actions">
        <div class="venue-action" onclick="showReviewForm(${id})">
          <div class="venue-action-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
          <span class="venue-action-label">Отзыв</span>
        </div>
        <div class="venue-action" onclick="doCheckin(${id})" id="aci${id}">
          <div class="venue-action-icon ${checkins[id]?'active':''}"><svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/></svg></div>
          <span class="venue-action-label">${checkins[id]?'Выполнено':'Чекин'}</span>
        </div>
        <div class="venue-action" onclick="toggleFollow(${id})" id="afl${id}">
          <div class="venue-action-icon ${v.follow?'active':''}"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></div>
          <span class="venue-action-label">${v.follow?'Отписаться':'Подписаться'}</span>
        </div>
        <div class="venue-action" onclick="toast('Маршрут строится...')">
          <div class="venue-action-icon"><svg viewBox="0 0 24 24"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg></div>
          <span class="venue-action-label">Маршрут</span>
        </div>
      </div>
      ${v.desc?`<div class="venue-section-title">О ЗАВЕДЕНИИ</div><div class="venue-desc">${v.desc}</div>`:''}
      <div class="venue-section-title">ЧАСЫ РАБОТЫ</div>
      <div class="venue-hours">${hoursHtml}</div>
      <div class="venue-contact" onclick="toast('Звоним...')">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.79 19.79 19.79 0 01.09 1.18 2 2 0 012.07 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.91 7.5a16 16 0 006.59 6.59l.87-.87a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 15.5v1.42z"/></svg>
        <span>${v.phone}</span>
      </div>
      <div class="venue-section-title">ОТЗЫВЫ · ${revs.length}</div>
      ${reviewsHtml}
      <button class="write-review-btn" onclick="showReviewForm(${id})">НАПИСАТЬ ОТЗЫВ</button>
    </div>`;
  document.getElementById('screen').appendChild(screen);
}

function closeVenue(){
  document.getElementById('screen').querySelector('#venueScreen')?.remove();
  currentVenueId=null;
  if(currentTab==='map'){
    document.getElementById('mapContainer').style.display='block';
    if(leafMap) setTimeout(()=>leafMap.invalidateSize(true),50);
  }
}

/* ── Actions ──────────────────────────────────────────────────── */
function toggleFav(id){
  const v=VENUES.find(x=>x.id===id);
  v.fav=!v.fav;
  const btn=document.getElementById('vfav'+id);
  if(btn) btn.textContent=v.fav?'❤️':'🤍';
  if(markers[id]) markers[id].setIcon(createPin(v.icon,selMarker===id,v.fav));
  toast(v.fav?'❤️ Добавлено в избранное':'Удалено из избранного');
}

function doCheckin(id){
  if(checkins[id]){toast('Вы уже делали чекин');return;}
  checkins[id]=true;
  const wrap=document.getElementById('aci'+id);
  if(wrap){
    wrap.querySelector('.venue-action-icon').classList.add('active');
    wrap.querySelector('.venue-action-label').textContent='Выполнено';
  }
  toast('✅ Чекин выполнен!');
}

function toggleFollow(id){
  const v=VENUES.find(x=>x.id===id);
  v.follow=!v.follow;
  const wrap=document.getElementById('afl'+id);
  if(wrap){
    wrap.querySelector('.venue-action-icon').classList.toggle('active',v.follow);
    wrap.querySelector('.venue-action-label').textContent=v.follow?'Отписаться':'Подписаться';
  }
  toast(v.follow?'🔔 Подписка оформлена':'Подписка отменена');
}

/* ── Review form ──────────────────────────────────────────────── */
let rRating=5;
function showReviewForm(id){
  rRating=5;
  document.getElementById('rvOverlay')?.remove();
  const o=document.createElement('div');
  o.className='review-overlay';o.id='rvOverlay';
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.innerHTML=`<div class="review-form">
    <div class="form-handle"></div>
    <div class="form-title">Написать отзыв</div>
    <input class="form-input" type="text" id="rvName" placeholder="Ваше имя">
    <div class="form-stars" id="rvStars">${[1,2,3,4,5].map(i=>`<button class="form-star-btn" onclick="setRv(${i})">${i<=5?'⭐':'☆'}</button>`).join('')}</div>
    <textarea class="form-input" id="rvText" placeholder="Поделитесь впечатлениями..." rows="3"></textarea>
    <button class="form-submit" onclick="submitReview(${id})">ОПУБЛИКОВАТЬ</button>
  </div>`;
  document.body.appendChild(o);
}
function setRv(r){
  rRating=r;
  const stars=document.querySelectorAll('.form-star-btn');
  stars.forEach((s,i)=>s.textContent=i<r?'⭐':'☆');
}
function submitReview(id){
  const name=document.getElementById('rvName')?.value.trim()||'Гость';
  const text=document.getElementById('rvText')?.value.trim();
  if(!text||text.length<5){toast('Напишите хотя бы пару слов');return;}
  if(!userReviews[id])userReviews[id]=[];
  userReviews[id].unshift({name,rating:rRating,text,date:'только что'});
  document.getElementById('rvOverlay')?.remove();
  toast('✅ Отзыв опубликован');
  if(currentVenueId===id){document.getElementById('venueScreen')?.remove();openVenue(id);}
}

/* ── Catalog ──────────────────────────────────────────────────── */
const CATS=[{id:'all',label:'Все'},{id:'Кафе',label:'Кафе'},{id:'Ресторан',label:'Рестораны'},{id:'Пиццерия',label:'Пиццерия'},{id:'Суши',label:'Суши'},{id:'Фастфуд',label:'Фастфуд'},{id:'Веганское',label:'Веганское'}];

function renderCatalog(){
  const filtered=VENUES.filter(v=>{
    const mc=catFilter==='all'||v.cat===catFilter;
    const ms=!catSearch||v.name.toLowerCase().includes(catSearch.toLowerCase())||v.addr.toLowerCase().includes(catSearch.toLowerCase());
    return mc&&ms;
  });
  const chips=CATS.map(c=>`<button class="chip${catFilter===c.id?' active':''}" onclick="setCat('${c.id}')">${c.label}</button>`).join('');
  const cards=filtered.length?filtered.map(v=>`
    <div class="venue-card" onclick="openVenue(${v.id})">
      <img class="venue-card-bg" src="${v.photo}" alt="" onerror="this.style.background='#1a1a1a'">
      <div class="venue-card-overlay"></div>
      <div class="venue-card-glass">
        <div class="venue-card-info">
          <div class="venue-card-name">${v.name}</div>
          <div class="venue-card-sub">${v.cat} · ${v.addr}</div>
        </div>
        <div class="venue-card-right">
          <div class="venue-rating">
            <span class="venue-rating-star">★</span>
            <span class="venue-rating-num">${v.rating}</span>
          </div>
          <span class="${v.open?'badge-open':'badge-closed'}">${v.open?'Открыто':'Закрыто'}</span>
        </div>
      </div>
      <div class="card-fav" onclick="event.stopPropagation();quickFav(${v.id},this)">${v.fav?'❤️':'🤍'}</div>
    </div>`).join(''):`<div style="text-align:center;padding:60px 0;color:rgba(255,255,255,0.2)"><div style="font-size:48px;margin-bottom:12px">🔍</div><div style="font-size:18px;font-weight:700">ПУСТО</div></div>`;
  return `<div class="catalog-wrap">
    <div class="catalog-header">
      <div class="catalog-title">КАТАЛОГ<span>.</span></div>
      <div class="catalog-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Ресторан, кафе, суши..." oninput="catSearch=this.value;refreshCatalog()" value="${catSearch}">
      </div>
      <div class="chips">${chips}</div>
    </div>
    <div class="catalog-list">${cards}</div>
  </div>`;
}

function setCat(id){catFilter=id;refreshCatalog();}
function refreshCatalog(){renderContent(renderCatalog());}
function quickFav(id,btn){
  const v=VENUES.find(x=>x.id===id);v.fav=!v.fav;
  btn.textContent=v.fav?'❤️':'🤍';
  if(markers[id])markers[id].setIcon(createPin(v.icon,selMarker===id,v.fav));
  toast(v.fav?'❤️ В избранном':'Удалено');
}

/* ── Favorites ────────────────────────────────────────────────── */
function renderFavorites(){
  const favs=VENUES.filter(v=>v.fav);
  return `<div class="fav-wrap">
    <div class="fav-title">ИЗБРАН<span>НОЕ</span><span style="color:#CAFF00">.</span></div>
    ${favs.length?`<div>${favs.map(v=>`
      <div class="venue-card" onclick="openVenue(${v.id})">
        <img class="venue-card-bg" src="${v.photo}" alt="" onerror="this.style.background='#1a1a1a'">
        <div class="venue-card-overlay"></div>
        <div class="venue-card-glass">
          <div class="venue-card-info">
            <div class="venue-card-name">${v.name}</div>
            <div class="venue-card-sub">${v.cat} · ${v.addr}</div>
          </div>
          <div class="venue-card-right">
            <div class="venue-rating"><span class="venue-rating-star">★</span><span class="venue-rating-num">${v.rating}</span></div>
            <span class="${v.open?'badge-open':'badge-closed'}">${v.open?'Открыто':'Закрыто'}</span>
          </div>
        </div>
        <div class="card-fav" onclick="event.stopPropagation();quickFav(${v.id},this)">❤️</div>
      </div>`).join('')}</div>`:
    `<div class="fav-empty">
      <div class="fav-empty-icon">🤍</div>
      <div class="fav-empty-title">ПУСТО</div>
      <div class="fav-empty-sub">Нажмите 🤍 на карточке<br>заведения чтобы добавить</div>
    </div>`}
  </div>`;
}

/* ── Profile ──────────────────────────────────────────────────── */
function renderProfile(){
  const favs=VENUES.filter(v=>v.fav);
  const follows=VENUES.filter(v=>v.follow).length;
  return `<div class="profile-wrap">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar">А</div>
      <div class="profile-name">Алексей</div>
      <div class="profile-phone">+7 343 000-00-00</div>
    </div>
    <div class="profile-stats">
      <div class="profile-stat"><div class="profile-stat-num">12</div><div class="profile-stat-label">ОТЗЫВОВ</div></div>
      <div class="profile-stat"><div class="profile-stat-num">34</div><div class="profile-stat-label">ЧЕКИНОВ</div></div>
      <div class="profile-stat"><div class="profile-stat-num">${follows}</div><div class="profile-stat-label">ПОДПИСОК</div></div>
    </div>
    ${favs.length?`<div class="profile-section-title">ИЗБРАННЫЕ</div>
    <div class="profile-favs">${favs.map(v=>`
      <div class="profile-fav-item" onclick="openVenue(${v.id})">
        <img class="profile-fav-img" src="${v.photo}" alt="" onerror="this.style.background='#1a1a1a'">
        <div class="profile-fav-name">${v.name}</div>
      </div>`).join('')}</div>`:''}
    <button class="profile-logout" onclick="toast('До свидания!')">Выйти из аккаунта</button>
  </div>`;
}

/* ── Init ─────────────────────────────────────────────────────── */
(function(){
  // Show map tab by default
  document.getElementById('mapContainer').style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>initMap()));
})();
</script>
</body>
</html>
